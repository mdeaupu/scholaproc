version: "3.8"

services:
  waha:
    image: devlikeapro/waha
    container_name: waha
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - WHATSAPP_HOOK_URL=http://host.docker.internal:8000/api/whatsapp/webhook
      - WHATSAPP_HOOK_EVENTS=message
      - WAHA_PRINT_QR=true
    volumes:
      - waha_sessions:/app/.sessions

volumes:
  waha_sessions:
